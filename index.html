<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IJ's Lab</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        align-items: center;
        background: radial-gradient(circle at top, #312e81 0, #111827 42%, #020617 100%);
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
      }

      .work-together-button {
        background: linear-gradient(135deg, #8b5cf6, #ec4899);
        border-radius: 999px;
        box-shadow: 0 20px 45px rgba(139, 92, 246, 0.35);
        color: #ffffff;
        display: inline-flex;
        font-size: clamp(1rem, 2.5vw, 1.25rem);
        font-weight: 700;
        letter-spacing: 0.02em;
        padding: 1rem 1.5rem;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .work-together-button:hover,
      .work-together-button:focus-visible {
        box-shadow: 0 24px 55px rgba(236, 72, 153, 0.42);
        outline: none;
        transform: translateY(-3px);
      }
    </style>
  </head>
  <body>
    <a class="work-together-button" href="https://letsworktogether.lakshyniti.com">
      Let's Work Together
    </a>
  </body>
</html>
